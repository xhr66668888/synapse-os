// ==========================================
// Synapse OS — gRPC Proto 定义
// 通用类型
// ==========================================

syntax = "proto3";

package synapse.v1;

option go_package = "github.com/panshakerservices/synapse-os/proto/synapse/v1";

// 通用分页请求
message PaginationRequest {
  int32 page = 1;          // 页码 (从 1 开始)
  int32 page_size = 2;     // 每页数量 (默认 20, 最大 100)
  string sort_by = 3;      // 排序字段
  string sort_order = 4;   // asc / desc
}

// 通用分页响应
message PaginationResponse {
  int32 total = 1;         // 总记录数
  int32 page = 2;          // 当前页码
  int32 page_size = 3;     // 每页数量
  int32 total_pages = 4;   // 总页数
}

// 时间戳 (RFC3339)
message Timestamp {
  string value = 1;
}

// 金额 (使用整数，单位: 分/cents，避免浮点精度问题)
message Money {
  int64 amount_cents = 1;  // 金额 (分)
  string currency = 2;     // 币种 (USD / CNY)
}

// 操作结果
message OperationResult {
  bool success = 1;
  string message = 2;
  string error_code = 3;   // 错误码 (如有)
}
